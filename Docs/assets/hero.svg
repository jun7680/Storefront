<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Storefront — SQLite and SwiftData viewer for macOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5AA7E6"/>
      <stop offset="60%" stop-color="#7CB8E8"/>
      <stop offset="100%" stop-color="#FF9F5A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1200" height="400" rx="28" fill="url(#bg)"/>

  <g opacity="0.28" filter="url(#soft)">
    <circle cx="960" cy="110" r="120" fill="#FFFFFF"/>
    <circle cx="1080" cy="320" r="80" fill="#FFFFFF"/>
    <circle cx="140" cy="340" r="100" fill="#FFFFFF"/>
  </g>

  <g transform="translate(80,110)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>
    <g transform="translate(22,22)" fill="#FFFFFF">
      <rect x="8" y="8" width="60" height="8" rx="2"/>
      <rect x="8" y="26" width="60" height="4" rx="2" opacity="0.7"/>
      <rect x="8" y="36" width="48" height="4" rx="2" opacity="0.55"/>
      <rect x="8" y="46" width="56" height="4" rx="2" opacity="0.7"/>
      <rect x="8" y="56" width="40" height="4" rx="2" opacity="0.55"/>
      <rect x="8" y="66" width="52" height="4" rx="2" opacity="0.7"/>
    </g>
  </g>

  <g transform="translate(260,130)">
    <text font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="88" fill="#FFFFFF" letter-spacing="-2">
      Storefront
    </text>
    <text y="60" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="26" fill="#FFFFFF" opacity="0.92" letter-spacing="0.5">
      Modern SQLite &amp; SwiftData viewer for macOS
    </text>
    <g transform="translate(0,100)" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#FFFFFF">
      <g>
        <rect x="0" y="0" width="140" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.35"/>
        <text x="70" y="23" text-anchor="middle">Live reload</text>
      </g>
      <g transform="translate(154,0)">
        <rect x="0" y="0" width="150" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.35"/>
        <text x="75" y="23" text-anchor="middle">SwiftData aware</text>
      </g>
      <g transform="translate(318,0)">
        <rect x="0" y="0" width="184" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.35"/>
        <text x="92" y="23" text-anchor="middle">Simulator auto-discovery</text>
      </g>
    </g>
  </g>
</svg>
