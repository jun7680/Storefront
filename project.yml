name: Storefront
options:
  bundleIdPrefix: com.moinjun
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.5.0
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.15.0

targets:
  Storefront:
    type: application
    platform: macOS
    sources:
      - path: Storefront
        excludes:
          - "Resources/Storefront.entitlements"
    resources:
      - path: Storefront/Resources/Assets.xcassets
    dependencies:
      - package: GRDB
      - package: ComposableArchitecture
        product: ComposableArchitecture
    info:
      path: Storefront/Resources/Info.plist
      properties:
        CFBundleDisplayName: Storefront
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "© 2026 Injun Mo. MIT License."
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: SQLite Database
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.database
              - com.moinjun.Storefront.sqlite
              - com.moinjun.Storefront.sqlitestore
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.moinjun.Storefront.sqlite
            UTTypeDescription: SQLite Database
            UTTypeConformsTo:
              - public.database
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - sqlite
                - sqlite3
                - db
          - UTTypeIdentifier: com.moinjun.Storefront.sqlitestore
            UTTypeDescription: SwiftData Store
            UTTypeConformsTo:
              - public.database
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - store
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moinjun.Storefront
        PRODUCT_NAME: Storefront
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AppAccent
        CODE_SIGN_ENTITLEMENTS: Storefront/Resources/Storefront.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO

  StorefrontTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: StorefrontTests
    dependencies:
      - target: Storefront
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Storefront.app/Contents/MacOS/Storefront

schemes:
  Storefront:
    build:
      targets:
        Storefront: all
        StorefrontTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StorefrontTests
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
